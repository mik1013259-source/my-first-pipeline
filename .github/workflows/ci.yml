name: Python Quality Control Line
on: [push] # Trigger the line whenever code is updated

jobs:
  run-tests:
    runs-on: ubuntu-latest # Spin up a temporary Linux sandbox
    steps:
      - name: Copy code into Sandbox
        uses: actions/checkout@v4

      - name: Fire up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Testing Tool
        run:          
          pip install pytest playwright pytest-playwright

      # Install the hidden Linux browser binaries inside the sandbox
      - name: Install Browser Drivers
        run: playwright install chromium --with-deps

      - name: Execute Automated QA Script
        # run: python -m pytest test_calculator.py
        run: python -m pytest

      # Upload screenshots and videos on failure
      - name: Upload Test Artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-artifacts
          retention-days: 2