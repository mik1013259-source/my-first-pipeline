name: Python Quality Control Line
on: [push] # Trigger the line whenever code is updated

jobs:
  run-tests:
    runs-on: ubuntu-latest # Spin up a temporary Linux sandbox
    steps:
      - name: Copy code into Sandbox
        uses: actions/checkout@v4

      - name: Fire up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Testing Tool
        run:          
          pip install pytest playwright pytest-playwright

      # Install the hidden Linux browser binaries inside the sandbox
      - name: Install Browser Drivers
        run: playwright install chromium --with-deps

      - name: Run tests with artifact output
      # This saves videos and screenshots to the 'test-results' folder
        run: pytest --browser chromium --screenshot on --video on --output=test-results/

      - name: Upload Test Artifacts
      # This step runs even if the previous test step fails
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: test-results/
          retention-days: 7
